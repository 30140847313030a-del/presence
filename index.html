const nameSel = document.getElementById('nameSelect');
db.members.sort().forEach(n => {
    const opt = document.createElement('option');
    opt.value = n;
    opt.textContent = n;
    nameSel.appendChild(opt);
});

function updateUI() {
    const name = nameSel.value;
    const area = document.getElementById('myScheduleArea');
    const list = document.getElementById('shiftList');
    document.getElementById('helperArea').style.display = 'none';

    if(!name) { area.style.display = 'none'; return; }
    
    area.style.display = 'block';
    const myShifts = db.schedule.filter(s => s.name === name);
    
    const mergedShiftsMap = {};
    myShifts.forEach(s => {
        if (!mergedShiftsMap[s.timeID]) {
            mergedShiftsMap[s.timeID] = {
                date: s.date,
                timeID: s.timeID,
                timeLabel: s.timeLabel,
                name: s.name,
                posArray: [s.pos]
            };
        } else {
            if (!mergedShiftsMap[s.timeID].posArray.includes(s.pos)) {
                mergedShiftsMap[s.timeID].posArray.push(s.pos);
            }
        }
    });

    const mergedShifts = Object.values(mergedShiftsMap);

    list.innerHTML = mergedShifts.length > 0 
        ? mergedShifts.map(s => {
            const joinedPos = s.posArray.join(' & ');
            return `
            <div class="shift-card" onclick="findHelpers('${s.timeID}', '${s.name}', '${joinedPos}')">
                <div><span class="tag-date">${s.date}</span> ${s.timeLabel}</div>
                <div class="pos">${joinedPos}</div>
            </div>
            `;
        }).join('')
        : '<div class="empty">µé©Õ£©ķĆÖõĖēÕż®ńø«ÕēŹµ▓Æµ£ēĶó½ÕłåķģŹµ£Źõ║ŗŃĆé</div>';
}

function findHelpers(timeID, myName, myPos) {
    const helperArea = document.getElementById('helperArea');
    const helperList = document.getElementById('helperList');
    const targetTitle = document.getElementById('targetTitle');
    
    helperArea.style.display = 'block';
    targetTitle.textContent = `ķćØÕ░ŹµÖéµ«Ą’╝Ü${timeID} (${myPos})`;

    const busyPeople = db.schedule.filter(s => s.timeID === timeID).map(s => s.name);
    
    const candidates = db.members.filter(m => {
        const isWorking = busyPeople.includes(m);
        const isMarkedNo = db.unavailable[m] && db.unavailable[m].includes(timeID);
        const isSelf = m === myName;
        return !isWorking && !isMarkedNo && !isSelf;
    });

    helperList.innerHTML = candidates.length > 0
        ? candidates.map(c => `<div class="name-pill">${c}</div>`).join('')
        : '<div style="color:red; width:100%; text-align:center; padding: 10px;">µŁżµÖéµ«ĄµÜ½ńäĪÕ«īÕģ©ń®║ķ¢ÆńÜäÕÉīÕĘź’╝īÕ╗║ĶŁ░Ķü»ń╣½ńĄäķĢĘÕŹöĶ¬┐ŃĆé</div>';

    helperArea.scrollIntoView({ behavior: 'smooth' });
}

const timeSel = document.getElementById('timeSelect');

const timeOrderMap = {
    "4/30 10:30AM-4PM": 1,
    "4/30 4PM-10PM": 2,
    "5/1 7:30AM-12PM": 3,
    "5/1 12PM-5PM": 4,
    "5/1 5PM-10PM": 5,
    "5/2 7:30AM-12PM": 6,
    "5/2 12PM-5PM": 7,
    "5/2 5PM-10PM": 8
};

const uniqueTimes = [];
const timeOptions = [];

db.schedule.forEach(s => {
    if (!uniqueTimes.includes(s.timeID)) {
        uniqueTimes.push(s.timeID);
        timeOptions.push({ id: s.timeID, label: `${s.date} ${s.timeLabel}` });
    }
});

timeOptions.sort((a, b) => (timeOrderMap[a.id] || 99) - (timeOrderMap[b.id] || 99));

timeOptions.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.label;
    timeSel.appendChild(opt);
});

function showRoster() {
    const tId = timeSel.value;
    const area = document.getElementById('rosterArea');
    const list = document.getElementById('rosterList');
    const title = document.getElementById('rosterTitle');

    if (!tId) { area.style.display = 'none'; return; }

    area.style.display = 'block';
    
    const workers = db.schedule.filter(s => s.timeID === tId);
    const uniqueWorkers = [...new Set(workers.map(w => w.name))];
    
    title.textContent = `µŁżµÖéµ«ĄÕģ▒µ£ē ${uniqueWorkers.length} õ║║ÕĆ╝ńÅŁ’╝Ü`;

    const posMap = {};
    workers.forEach(w => {
        const cleanPos = w.pos.split('(')[0]; 
        if(!posMap[cleanPos]) posMap[cleanPos] = [];
        if(!posMap[cleanPos].includes(w.name)) {
            posMap[cleanPos].push(w.name);
        }
    });

    let html = '';
    for (const [pos, names] of Object.entries(posMap)) {
        html += `<div style="margin-bottom: 12px; border-bottom: 1px solid #ffedd5; padding-bottom: 8px;">
                    <span class="tag-pos">${pos}</span>
                    ${names.map(n => `<span style="display:inline-block; margin-right:12px; font-weight:500; color:#475569;">${n}</span>`).join('')}
                 </div>`;
    }

    list.innerHTML = html;
}
