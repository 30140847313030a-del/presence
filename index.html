<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <title>CONF2026 Booth Team 換班助手</title>
    <style>
        :root { --primary: #1d4ed8; --secondary: #64748b; --success: #22c55e; --accent: #ea580c; --bg: #f8fafc; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 15px; color: #1e293b; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { font-size: 1.4rem; color: var(--primary); text-align: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; }
        h2 { font-size: 1.2rem; color: var(--secondary); border-left: 4px solid var(--primary); padding-left: 10px; margin-top: 30px; margin-bottom: 15px; }
        h2.roster-title { border-left-color: var(--accent); }
        .section { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--secondary); }
        select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        .shift-card { border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-bottom: 10px; cursor: pointer; background: #fff; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .shift-card:hover { border-color: var(--primary); background: #f0f7ff; transform: translateY(-1px); }
        .tag-date { background: var(--primary); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 8px; }
        .tag-pos { background: var(--accent); color: white; padding: 3px 10px; border-radius: 6px; font-size: 0.85rem; margin-right: 12px; min-width: 60px; text-align: center; display: inline-block; }
        .pos { font-weight: bold; color: #0f172a; text-align: right;}
        .helper-box { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        .roster-box { background: #fff7ed; border: 1px solid #fed7aa; padding: 20px; border-radius: 10px; margin-top: 15px; display: none; }
        .helper-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .name-pill { background: white; border: 1px solid #dcfce7; padding: 6px 14px; border-radius: 20px; font-size: 0.9rem; color: #15803d; font-weight: 500; }
        .empty { text-align: center; color: #94a3b8; padding: 20px; background: #f1f5f9; border-radius: 8px; }
        .divider { height: 1px; background: #e2e8f0; margin: 35px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>CONF2026 Booth Team 查詢系統</h1>
    
    <h2>🧑‍🤝‍🧑 個人班表與找代班</h2>
    <div class="section">
        <label>1. 選擇您的姓名</label>
        <select id="nameSelect" onchange="updateUI()">
            <option value="">-- 請下拉選擇您的姓名 --</option>
        </select>
    </div>

    <div id="myScheduleArea" class="section" style="display:none;">
        <label>2. 您的排班時段 (點擊任一時段尋找代班人)</label>
        <div id="shiftList"></div>
    </div>

    <div id="helperArea" class="helper-box">
        <div id="targetTitle" style="font-weight: bold; color: var(--primary); border-bottom: 1px dashed #bbf7d0; padding-bottom: 10px;"></div>
        <div style="margin-top:15px; font-weight: bold;">💡 建議找以下同工協調換班：</div>
        <div id="helperList" class="helper-list"></div>

    </div>

    <div class="divider"></div>

    <h2 class="roster-title">📅 依時段查詢值班名單</h2>
    <div class="section">
        <label>請選擇要查詢的時段</label>
        <select id="timeSelect" onchange="showRoster()">

    </div>
    
    <div id="rosterArea" class="roster-box">

</div>

const nameSel = document.getElementById('nameSelect');
db.members.sort().forEach(n => {
    const opt = document.createElement('option');
    opt.value = n;
    opt.textContent = n;
    nameSel.appendChild(opt);
});

function updateUI() {
    const name = nameSel.value;
    const area = document.getElementById('myScheduleArea');
    const list = document.getElementById('shiftList');
    document.getElementById('helperArea').style.display = 'none';

    if(!name) { area.style.display = 'none'; return; }
    
    area.style.display = 'block';
    const myShifts = db.schedule.filter(s => s.name === name);
    
    const mergedShiftsMap = {};
    myShifts.forEach(s => {
        if (!mergedShiftsMap[s.timeID]) {
            mergedShiftsMap[s.timeID] = {
                date: s.date,
                timeID: s.timeID,
                timeLabel: s.timeLabel,
                name: s.name,
                posArray: [s.pos]
            };
        } else {
            if (!mergedShiftsMap[s.timeID].posArray.includes(s.pos)) {
                mergedShiftsMap[s.timeID].posArray.push(s.pos);
            }
        }
    });

    const mergedShifts = Object.values(mergedShiftsMap);

    list.innerHTML = mergedShifts.length > 0 
        ? mergedShifts.map(s => {
            const joinedPos = s.posArray.join(' & ');
            return `
            <div class="shift-card" onclick="findHelpers('${s.timeID}', '${s.name}', '${joinedPos}')">
                <div><span class="tag-date">${s.date}</span> ${s.timeLabel}</div>
                <div class="pos">${joinedPos}</div>
            </div>
            `;
        }).join('')
        : '<div class="empty">您在這三天目前沒有被分配服事。</div>';
}

function findHelpers(timeID, myName, myPos) {
    const helperArea = document.getElementById('helperArea');
    const helperList = document.getElementById('helperList');
    const targetTitle = document.getElementById('targetTitle');
    
    helperArea.style.display = 'block';
    targetTitle.textContent = `針對時段：${timeID} (${myPos})`;

    const busyPeople = db.schedule.filter(s => s.timeID === timeID).map(s => s.name);
    
    const candidates = db.members.filter(m => {
        const isWorking = busyPeople.includes(m);
        const isMarkedNo = db.unavailable[m] && db.unavailable[m].includes(timeID);
        const isSelf = m === myName;
        return !isWorking && !isMarkedNo && !isSelf;
    });

    helperList.innerHTML = candidates.length > 0
        ? candidates.map(c => `<div class="name-pill">${c}</div>`).join('')
        : '<div style="color:red; width:100%; text-align:center; padding: 10px;">此時段暫無完全空閒的同工，建議聯繫組長協調。</div>';

    helperArea.scrollIntoView({ behavior: 'smooth' });
}

const timeSel = document.getElementById('timeSelect');

const timeOrderMap = {
    "4/30 10:30AM-4PM": 1,
    "4/30 4PM-10PM": 2,
    "5/1 7:30AM-12PM": 3,
    "5/1 12PM-5PM": 4,
    "5/1 5PM-10PM": 5,
    "5/2 7:30AM-12PM": 6,
    "5/2 12PM-5PM": 7,
    "5/2 5PM-10PM": 8
};

const uniqueTimes = [];
const timeOptions = [];

db.schedule.forEach(s => {
    if (!uniqueTimes.includes(s.timeID)) {
        uniqueTimes.push(s.timeID);
        timeOptions.push({ id: s.timeID, label: `${s.date} ${s.timeLabel}` });
    }
});

timeOptions.sort((a, b) => (timeOrderMap[a.id] || 99) - (timeOrderMap[b.id] || 99));

timeOptions.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.label;
    timeSel.appendChild(opt);
});

function showRoster() {
    const tId = timeSel.value;
    const area = document.getElementById('rosterArea');
    const list = document.getElementById('rosterList');
    const title = document.getElementById('rosterTitle');

    if (!tId) { area.style.display = 'none'; return; }

    area.style.display = 'block';
    
    const workers = db.schedule.filter(s => s.timeID === tId);
    const uniqueWorkers = [...new Set(workers.map(w => w.name))];
    
    title.textContent = `✅ 此時段共有 ${uniqueWorkers.length} 人值班：`;

    const posMap = {};
    workers.forEach(w => {
        const cleanPos = w.pos.split('(')[0]; 
        if(!posMap[cleanPos]) posMap[cleanPos] = [];
        if(!posMap[cleanPos].includes(w.name)) {
            posMap[cleanPos].push(w.name);
        }
    });

    let html = '';
    for (const [pos, names] of Object.entries(posMap)) {
        html += `<div style="margin-bottom: 12px; border-bottom: 1px solid #ffedd5; padding-bottom: 8px;">
                    <span class="tag-pos">${pos}</span>
                    ${names.map(n => `<span style="display:inline-block; margin-right:12px; font-weight:500; color:#475569;">${n}</span>`).join('')}
                 </div>`;
    }

    list.innerHTML = html;
}
